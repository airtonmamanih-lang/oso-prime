<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clásico Juego de Pong</title>
    <style>
        body {
            margin: 0;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 4px solid white;
            background-color: black;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <canvas id="pongCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById("pongCanvas");
        const ctx = canvas.getContext("2d");

        // Configuración de las paletas (Paddles)
        const paddleWidth = 10, paddleHeight = 100;
        
        const player = {
            x: 0,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            score: 0,
            color: "WHITE"
        };

        const computer = {
            x: canvas.width - paddleWidth,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            score: 0,
            color: "WHITE"
        };

        // Configuración de la pelota
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 10,
            speed: 7,
            velocityX: 7,
            velocityY: 7,
            color: "WHITE"
        };

        // Control del jugador con el mouse
        canvas.addEventListener("mousemove", (evt) => {
            let rect = canvas.getBoundingClientRect();
            player.y = evt.clientY - rect.top - player.height / 2;
        });

        // Función para dibujar rectángulos
        function drawRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, w, h);
        }

        // Función para dibujar círculos (la pelota)
        function drawCircle(x, y, r, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2, false);
            ctx.closePath();
            ctx.fill();
        }

        // Función para dibujar texto (Marcador)
        function drawText(text, x, y, color) {
            ctx.fillStyle = color;
            ctx.font = "45px Arial";
            ctx.fillText(text, x, y);
        }

        // Redibujar la red central
        function drawNet() {
            for(let i = 0; i <= canvas.height; i += 15) {
                drawRect(canvas.width / 2 - 1, i, 2, 10, "WHITE");
            }
        }

        // Resetear la pelota cuando alguien anota
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.velocityX = -ball.velocityX;
            ball.speed = 7;
        }

        // Detectar colisiones simples
        function collision(b, p) {
            p.top = p.y;
            p.bottom = p.y + p.height;
            p.left = p.x;
            p.right = p.x + p.width;
            
            b.top = b.y - b.radius;
            b.bottom = b.y + b.radius;
            b.left = b.x - b.radius;
            b.right = b.x + b.radius;
            
            return b.right > p.left && b.bottom > p.top && b.left < p.right && b.top < p.bottom;
        }

        // Actualización de la lógica del juego
        function update() {
            // Mover la pelota
            ball.x += ball.velocityX;
            ball.y += ball.velocityY;
            
            // Inteligencia Artificial simple para la computadora
            let computerLevel = 0.1; // Ajusta esto para cambiar la dificultad (0.1 es fácil, 1 es invencible)
            computer.y += (ball.y - (computer.y + computer.height / 2)) * computerLevel;
            
            // Rebote en paredes superior e inferior
            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.velocityY = -ball.velocityY;
            }
            
            // Determinar qué paleta está golpeando la pelota
            let playerOrComp = (ball.x < canvas.width / 2) ? player : computer;
            
            if (collision(ball, playerOrComp)) {
                // Calcular dónde golpeó a la paleta para cambiar el ángulo
                let collidePoint = (ball.y - (playerOrComp.y + playerOrComp.height / 2));
                collidePoint = collidePoint / (playerOrComp.height / 2);
                
                let angleRad = (Math.PI / 4) * collidePoint;
                
                // Cambiar dirección de la velocidad X
                let direction = (ball.x < canvas.width / 2) ? 1 : -1;
                ball.velocityX = direction * ball.speed * Math.cos(angleRad);
                ball.velocityY = ball.speed * Math.sin(angleRad);
                
                // Aumentar la velocidad en cada golpe
                ball.speed += 0.5;
            }
            
            // Actualizar marcador
            if (ball.x - ball.radius < 0) {
                computer.score++;
                resetBall();
            } else if (ball.x + ball.radius > canvas.width) {
                player.score++;
                resetBall();
            }
        }

        // Renderizado gráfico del juego
        function render() {
            // Limpiar el canvas
            drawRect(0, 0, canvas.width, canvas.height, "BLACK");
            
            // Dibujar elementos
            drawNet();
            drawText(player.score, canvas.width / 4, canvas.height / 5, "WHITE");
            drawText(computer.score, 3 * canvas.width / 4, canvas.height / 5, "WHITE");
            drawRect(player.x, player.y, player.width, player.height, player.color);
            drawRect(computer.x, computer.y, computer.width, computer.height, computer.color);
            drawCircle(ball.x, ball.y, ball.radius, ball.color);
        }

        // Bucle principal del juego (Game Loop)
        function game() {
            update();
            render();
        }

        // Ejecutar el juego a 60 fotogramas por segundo
        const framePerSecond = 60;
        setInterval(game, 1000 / framePerSecond);
    </script>
</body>
</html>
